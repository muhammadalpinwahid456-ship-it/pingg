<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALVIN Profile</title>
    <link rel="stylesheet" href="profile.css">
</head>
<body>
    <!-- AUTH CHECK -->
    <div id="authCheck" class="auth-check">
        <div class="auth-message">
            <h2>⚠️ Silakan Login Terlebih Dahulu</h2>
            <p>Anda harus login untuk mengakses halaman profile</p>
            <button onclick="window.location.href='index.html'">Kembali ke Homepage</button>
        </div>
    </div>

    <!-- PROFILE CONTAINER -->
    <div id="profileContainer" class="profile-container" style="display: none;">
        <!-- HEADER -->
        <header class="profile-header">
            <div class="header-left">
                <h1 class="logo">👤 ALVIN Profile</h1>
            </div>
            <div class="header-right">
                <a href="reels.html" class="btn-reels">🎬 Reels</a>
                <a href="chat.html" class="btn-chat">💬 Chat</a>
                <a href="index.html" class="btn-home">🏠 Home</a>
                <button class="btn-logout-profile" onclick="logoutProfile()">Logout</button>
            </div>
        </header>

        <!-- PROFILE SECTION -->
        <div class="profile-content">
            <!-- PROFILE HEADER -->
            <div class="profile-header-section">
                <div class="profile-pic-wrapper">
                    <img id="profilePic" class="profile-pic" src="https://via.placeholder.com/150" alt="Profile">
                    <button class="btn-edit-pic" onclick="openEditPhoto()">📷</button>
                </div>
                <input type="file" id="photoUpload" accept="image/*" style="display: none;">

                <div class="profile-info">
                    <h2 id="profileName">User Name</h2>
                    <p id="profileDesc" class="profile-desc">Belum ada deskripsi</p>
                    
                    <div class="profile-stats">
                        <div class="stat">
                            <span class="stat-value" id="totalLikes">0</span>
                            <span class="stat-label">Total Likes</span>
                        </div>
                        <div class="stat">
                            <span class="stat-value" id="totalReels">0</span>
                            <span class="stat-label">Reels</span>
                        </div>
                    </div>

                    <button class="btn-edit-profile" onclick="openEditModal()">Edit Profile</button>
                </div>
            </div>

            <!-- GALLERY SECTION -->
            <div class="gallery-section">
                <h3>Reels Saya</h3>
                <div class="gallery-grid" id="galleryGrid">
                    <!-- Gallery items akan ditampilkan di sini -->
                </div>
            </div>
        </div>
    </div>

    <!-- EDIT PROFILE MODAL -->
    <div id="editModal" class="modal" style="display: none;">
        <div class="modal-content">
            <button class="modal-close" onclick="closeEditModal()">✕</button>
            <h2>Edit Profile</h2>
            
            <form id="editForm">
                <div class="form-group">
                    <label for="editName">Nama Lengkap</label>
                    <input 
                        type="text" 
                        id="editName" 
                        placeholder="Masukkan nama Anda" 
                        required 
                        maxlength="100"
                    >
                </div>

                <div class="form-group">
                    <label for="editDesc">Deskripsi</label>
                    <textarea 
                        id="editDesc" 
                        placeholder="Tulis deskripsi tentang Anda" 
                        maxlength="150"
                        rows="3"
                    ></textarea>
                    <span class="char-count"><span id="descCount">0</span>/150</span>
                </div>

                <button type="submit" class="btn-save">Simpan Perubahan</button>
            </form>
        </div>
    </div>

    <!-- FIREBASE SCRIPTS -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import {
            getAuth,
            onAuthStateChanged,
            signOut
        } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import {
            getDatabase,
            ref,
            onValue,
            get,
            update,
            set
        } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDzDRaHEASBWO0dDKOIlvlku3lN01b89iw",
            authDomain: "alvin-f573e.firebaseapp.com",
            projectId: "alvin-f573e",
            storageBucket: "alvin-f573e.firebasestorage.app",
            messagingSenderId: "718704784181",
            appId: "1:718704784181:web:db5fe912a3cb3b0675d27c",
            measurementId: "G-NHLWBMV307",
            databaseURL: "https://alvin-f573e-default-rtdb.asia-southeast1.firebasedatabase.app"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const database = getDatabase(app);

        let currentUser = null;
        let userReels = [];
        let userProfileUnsubscribe = null;
        let userReelsUnsubscribe = null;

        // ===== AUTH CHECK =====
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('authCheck').style.display = 'none';
                document.getElementById('profileContainer').style.display = 'block';
                console.log('✅ User logged in:', user.uid);
                
                // PERBAIKAN: Pastikan user data ada di database
                ensureUserDataExists(user);
                loadUserProfile();
                loadUserReels();
            } else {
                document.getElementById('authCheck').style.display = 'flex';
                document.getElementById('profileContainer').style.display = 'none';
                if (userProfileUnsubscribe) userProfileUnsubscribe();
                if (userReelsUnsubscribe) userReelsUnsubscribe();
            }
        });

        // PERBAIKAN: Pastikan data user ada di database untuk user baru
        function ensureUserDataExists(user) {
            const userRef = ref(database, 'users/' + user.uid);
            get(userRef).then((snapshot) => {
                if (!snapshot.exists()) {
                    console.log('📝 Creating new user data...');
                    // Jika user baru, buat data default
                    set(userRef, {
                        fullname: user.displayName || user.email.split('@')[0],
                        email: user.email,
                        photoURL: 'https://via.placeholder.com/150',
                        description: '',
                        createdAt: new Date().toISOString()
                    }).then(() => {
                        console.log('✅ User data created successfully');
                    }).catch(err => {
                        console.error('❌ Error creating user data:', err);
                    });
                } else {
                    console.log('✅ User data already exists');
                }
            }).catch(err => {
                console.error('❌ Error checking user data:', err);
            });
        }

        // Load user profile (DIPERBAIKI: Realtime listener dengan fallback)
        function loadUserProfile() {
            const userRef = ref(database, 'users/' + currentUser.uid);
            
            if (userProfileUnsubscribe) userProfileUnsubscribe();
            
            userProfileUnsubscribe = onValue(userRef, (snapshot) => {
                if (snapshot.exists()) {
                    const userData = snapshot.val();
                    
                    // Update UI dengan data yang ada
                    const fullname = userData.fullname || 'User';
                    const description = userData.description || 'Belum ada deskripsi';
                    const photoURL = userData.photoURL || 'https://via.placeholder.com/150';
                    
                    document.getElementById('profileName').textContent = fullname;
                    document.getElementById('profileDesc').textContent = description;
                    document.getElementById('profilePic').src = photoURL;

                    // Update form inputs
                    document.getElementById('editName').value = fullname;
                    document.getElementById('editDesc').value = userData.description || '';
                    document.getElementById('descCount').textContent = (userData.description || '').length;
                    
                    console.log('✅ Profile loaded:', fullname);
                } else {
                    console.warn('⚠️ User data not found, creating default data...');
                    // Jika data tidak ada, buat data default
                    set(userRef, {
                        fullname: currentUser.displayName || currentUser.email.split('@')[0],
                        email: currentUser.email,
                        photoURL: 'https://via.placeholder.com/150',
                        description: '',
                        createdAt: new Date().toISOString()
                    }).catch(err => console.error('Error creating default data:', err));
                }
            }, (error) => {
                console.error('❌ Error loading profile:', error);
            });
        }

        // Load user reels (DIPERBAIKI: Realtime listener dengan filter)
        function loadUserReels() {
            const reelsRef = ref(database, 'reels');
            
            if (userReelsUnsubscribe) userReelsUnsubscribe();
            
            userReelsUnsubscribe = onValue(reelsRef, (snapshot) => {
                userReels = [];
                if (snapshot.exists()) {
                    snapshot.forEach((childSnapshot) => {
                        const reelData = childSnapshot.val();
                        // Filter hanya reels milik user ini
                        if (reelData.userId === currentUser.uid && reelData.mediaUrl) {
                            userReels.push({
                                id: childSnapshot.key,
                                ...reelData
                            });
                        }
                    });
                    // Sort by timestamp (terbaru dulu)
                    userReels.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
                    console.log('✅ User reels loaded:', userReels.length);
                }
                displayUserReels();
                updateStats();
            }, (error) => {
                console.error('❌ Error loading reels:', error);
            });
        }

        // Display user reels (DIPERBAIKI: Ukuran dan styling)
        function displayUserReels() {
            const gallery = document.getElementById('galleryGrid');
            gallery.innerHTML = '';

            if (userReels.length === 0) {
                gallery.innerHTML = '<p class="no-reels">Anda belum upload reels. <a href="reels.html">Upload sekarang!</a></p>';
                return;
            }

            userReels.forEach(reel => {
                const galleryItem = document.createElement('div');
                galleryItem.className = 'gallery-item';
                
                // PERBAIKAN: Media dengan ukuran proporsional
                const mediaHtml = reel.mediaType === 'video'
                    ? `<video src="${reel.mediaUrl}" controls preload="metadata" style="width: 100%; height: 100%; object-fit: cover;" onerror="handleVideoError(this)"></video>`
                    : `<img src="${reel.mediaUrl}" alt="reel" style="width: 100%; height: 100%; object-fit: cover;" onerror="handleImageError(this)">`;

                const likeCount = Object.keys(reel.likes || {}).length;
                const commentCount = Object.keys(reel.comments || {}).length;

                galleryItem.innerHTML = `
                    <div class="gallery-media">
                        ${mediaHtml}
                        <div class="gallery-overlay">
                            <div class="gallery-stats">
                                <span>❤️ ${likeCount}</span>
                                <span>💬 ${commentCount}</span>
                            </div>
                        </div>
                    </div>
                    <p class="gallery-caption">${escapeHtml(reel.caption)}</p>
                `;

                gallery.appendChild(galleryItem);
            });
        }

        // Update stats
        function updateStats() {
            let totalLikes = 0;
            userReels.forEach(reel => {
                totalLikes += Object.keys(reel.likes || {}).length;
            });

            document.getElementById('totalLikes').textContent = totalLikes;
            document.getElementById('totalReels').textContent = userReels.length;
            
            console.log('📊 Stats updated - Reels:', userReels.length, 'Likes:', totalLikes);
        }

        // Open edit photo
        window.openEditPhoto = function() {
            document.getElementById('photoUpload').click();
        };

        // Photo upload
        document.getElementById('photoUpload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                if (file.size > 5 * 1024 * 1024) {
                    alert('❌ File terlalu besar! Max 5MB');
                    return;
                }
                
                const reader = new FileReader();
                reader.onload = async (event) => {
                    try {
                        const photoURL = event.target.result;
                        const userRef = ref(database, 'users/' + currentUser.uid);
                        await update(userRef, { photoURL: photoURL });
                        document.getElementById('profilePic').src = photoURL;
                        alert('✅ Foto profil berhasil diperbarui!');
                        console.log('✅ Photo updated');
                    } catch (error) {
                        alert('❌ Error: ' + error.message);
                        console.error('Photo upload error:', error);
                    }
                };
                reader.readAsDataURL(file);
            }
        });

        // Open edit modal
        window.openEditModal = function() {
            document.getElementById('editModal').style.display = 'flex';
        };

        // Close edit modal
        window.closeEditModal = function() {
            document.getElementById('editModal').style.display = 'none';
        };

        // Description counter
        document.getElementById('editDesc').addEventListener('input', function() {
            document.getElementById('descCount').textContent = this.value.length;
        });

        // Edit form submit (PERBAIKAN: Better error handling)
        document.getElementById('editForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const name = document.getElementById('editName').value.trim();
            const description = document.getElementById('editDesc').value.trim();

            if (!name) {
                alert('❌ Nama tidak boleh kosong');
                return;
            }

            if (name.length < 3) {
                alert('⚠️ Nama minimal 3 karakter');
                return;
            }

            const submitBtn = e.target.querySelector('button[type="submit"]');
            const originalText = submitBtn.textContent;
            
            submitBtn.disabled = true;
            submitBtn.textContent = '⏳ Menyimpan...';

            try {
                console.log('🔄 Updating profile...');
                const userRef = ref(database, 'users/' + currentUser.uid);
                await update(userRef, {
                    fullname: name,
                    description: description
                });

                console.log('✅ Profile updated successfully');
                alert('✅ Profile berhasil diperbarui!');
                closeEditModal();
            } catch (error) {
                console.error('❌ Profile update error:', error);
                
                // PERBAIKAN: Specific error handling
                if (error.code === 'PERMISSION_DENIED') {
                    alert('❌ Tidak ada izin untuk mengubah profil. Silakan logout dan login kembali.');
                } else {
                    alert('❌ Error: ' + error.message);
                }
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = originalText;
            }
        });

        // Logout
        window.logoutProfile = function() {
            if (confirm('Apakah Anda yakin ingin logout?')) {
                if (userProfileUnsubscribe) userProfileUnsubscribe();
                if (userReelsUnsubscribe) userReelsUnsubscribe();
                signOut(auth).then(() => {
                    window.location.href = 'index.html';
                }).catch(err => {
                    alert('❌ Error: ' + err.message);
                    console.error('Logout error:', err);
                });
            }
        };

        // Escape HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Handle video error
        window.handleVideoError = function(videoElement) {
            console.error('Video failed to load:', videoElement.src);
            videoElement.style.display = 'none';
            const errorDiv = document.createElement('div');
            errorDiv.className = 'media-error';
            errorDiv.innerHTML = '❌ Video gagal dimuat';
            videoElement.parentNode.appendChild(errorDiv);
        };

        // Handle image error
        window.handleImageError = function(imgElement) {
            console.error('Image failed to load:', imgElement.src);
            imgElement.style.display = 'none';
            const errorDiv = document.createElement('div');
            errorDiv.className = 'media-error';
            errorDiv.innerHTML = '❌ Gambar gagal dimuat';
            imgElement.parentNode.appendChild(errorDiv);
        };
    </script>
</body>
</html>
